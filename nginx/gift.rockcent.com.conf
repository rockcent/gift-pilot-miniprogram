# /etc/nginx/conf.d/gift.rockcent.com.conf
# 礼有方（GiftPilot）网页端 + 小程序 H5 共享 server block
# 网页端 SPA:  Vite build → /usr/share/nginx/giftpilot/dist/      (root /)
# 小程序 H5:   Taro  build → /usr/share/nginx/giftpilot/h5/dist/  (alias /h5/)
#
# 部署触发：
#   - gift-pilot-web/scripts/deploy-production.sh        → 网页端 dist + 此 conf
#   - gift-pilot-miniprogram/scripts/deploy-production.sh → 小程序 H5 dist + 此 conf
# 关联 runbook：
#   - cloud-server-ops/runbooks/giftpilot-web-deploy.md
#
# 关键不变量：
# - SPA fallback（网页）: try_files $uri $uri/ /index.html
# - SPA fallback（H5）:   try_files $uri $uri/ /index.html  （alias 下的 /index.html）
# - assets 强缓存（文件名带 hash 即可永久缓存）
# - index.html / h5/index.html 永不缓存（保证新版本立刻生效）
# - §6.8 admin 路由仅本地注入，不暴露公网隐式入口（/admin/login 是显式登录页）

# --- HTTP → HTTPS 重定向 ---
server {
    listen 80;
    listen [::]:80;
    server_name gift.rockcent.com;

    # certbot webroot 验证需要保留
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS 主站 ---
server {
    # nginx 1.24 语法：listen 443 ssl http2（参考 ai.rockcent.com.conf）
    listen 443 ssl http2;
    server_name gift.rockcent.com;

    # Let's Encrypt per-domain 证书（部署前需手动 certbot 一次）
    ssl_certificate /etc/letsencrypt/live/gift.rockcent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gift.rockcent.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # ssl_session_cache 不在本站声明，复用 rockcent.conf 的 shared:SSL:50m 避免 zone 大小冲突
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 静态文件根目录（网页端）
    root /usr/share/nginx/giftpilot/dist;
    index index.html;

    # 安全头（API 真接通后追加 CSP / HSTS）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        font/woff
        font/woff2
        image/svg+xml;

    # ===== 小程序 H5 子路径 /h5/ =====
    # Taro H5 build 输出到 /usr/share/nginx/giftpilot/h5/dist/
    # 公网 URL: https://gift.rockcent.com/h5/  →  /usr/share/nginx/giftpilot/h5/dist/index.html
    # 路由：#/pages/xxx/index（hash 路由，由前端 history 处理）

    # 1. 静态资源（regex 优先于 prefix）
    # alias 模式：URL /h5/js/app.js → /usr/share/nginx/giftpilot/h5/dist/js/app.js
    location ~* ^/h5/.*\.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        alias /usr/share/nginx/giftpilot/h5/dist/;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # 2. h5/index.html 永不缓存（= 精确匹配优先于 ^~）
    location = /h5/index.html {
        alias /usr/share/nginx/giftpilot/h5/dist/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # 3. SPA fallback（^~ prefix 兜底，hash 路由由前端处理）
    # try_files 走 alias：/h5/foo → /h5/dist/foo；都不存在回 /h5/dist/index.html
    location ^~ /h5/ {
        alias /usr/share/nginx/giftpilot/h5/dist/;
        try_files $uri $uri/ /index.html;
    }

    # ===== 网页端 SPA =====
    # 静态资源（hash 命名的 Vite assets）—— 强缓存 1 年
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback —— 所有非静态资源路径都回到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 永不缓存，保证新版本立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # 健康检查端点（不依赖 vite preview，纯文件存在判断）
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # 隐藏 .git / .env / node_modules 等意外泄露
    location ~ /\.(git|env|svn|hg) {
        deny all;
        return 404;
    }
}
