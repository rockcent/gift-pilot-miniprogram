name: gift-pilot-miniprogram CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint + Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check platform pin
        run: node ./scripts/check-platform-deps-local.mjs

      - name: Sensitive scan
        run: node ./scripts/check-no-sensitive.mjs

      - name: Smoke (14 pages incl. V0.8 PR-1 + V1.0 PR-16/17/18 + 7 services + SECURITY gate)
        run: node ./scripts/smoke-weapp.mjs

      # lint / build:weapp / test 需要真实安装 @rockcent/platform 与 Taro 才能跑；
      # .github/workflows/deploy-production.yml 已经完整跑过 install + build:h5，
      # 这里只跑静态 smoke 加快 PR review 反馈。
      # - run: pnpm install --frozen-lockfile
      # - run: pnpm run lint
      # - run: pnpm run build:weapp
      # - run: pnpm test -- --passWithNoTests
