name: gift-pilot-miniprogram CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint + Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check platform pin
        run: node ./scripts/check-platform-deps-local.mjs

      - name: Sensitive scan
        run: node ./scripts/check-no-sensitive.mjs

      - name: Smoke (10 pages + 6 AI labels + integer fen)
        run: node ./scripts/smoke-weapp.mjs

      # lint / build:weapp / test 需要真实安装 @rockcent/platform 与 Taro 才能跑；
      # 阶段二接通真实仓后启用：
      # - run: pnpm install --frozen-lockfile
      # - run: pnpm run lint
      # - run: pnpm run build:weapp
      # - run: pnpm test -- --passWithNoTests
